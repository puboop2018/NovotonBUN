####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: qodana-php
profile:
  name: qodana.recommended

# ── Why these exclusions ─────────────────────────────────────────────────────
# This repo holds CS-Cart *addons*. The CS-Cart core (the `Tygh\…` classes,
# the `fn_*()` / `db_*()` globals, AREA/`CART_LANGUAGE`/`BOOTSTRAP`-style
# constants, …) lives OUTSIDE the repo, so Qodana's "undefined symbol"
# inspections flag thousands of phantom problems for code that is perfectly
# valid at runtime. PHPStan (level 10) + Psalm already resolve those symbols
# correctly via stubs/Tygh.php and the baseline, so silencing them here keeps
# Qodana's report meaningful and non-overlapping with the existing gauntlet.
#
# A couple of style inspections are also dropped because they directly conflict
# with the project's PHPCS / php-cs-fixer rules (acting on them would fight the
# gauntlet). Third-party / generated / test directories are skipped too.
exclude:
  # Framework "undefined symbol" false-positives (owned by PHPStan + Psalm):
  - name: PhpUndefinedClassInspection
  - name: PhpUndefinedMethodInspection
  - name: PhpUndefinedFunctionInspection
  - name: PhpUndefinedNamespaceInspection
  - name: PhpUndefinedConstantInspection
  - name: PhpUndefinedVariableInspection
  - name: PhpUndefinedFieldInspection
  # ext-* requirements are managed per-addon, not at the repo root:
  - name: PhpComposerExtensionStubsInspection
  # Style opinions that conflict with our PHPCS / php-cs-fixer config:
  - name: PhpUnnecessaryCurlyVarSyntaxInspection   # "{$var}" interpolation is the house style
  - name: PhpFullyQualifiedNameUsageInspection     # deliberate \Tygh\… FQNs in procedural files
  # ── Notice-level inspections muted ──────────────────────────────────────────
  # Either owned by PHPStan L10 (type/dead-code correctness) or conflicting with
  # this codebase's pragmatic, procedural CS-Cart style. Muting them keeps the
  # Qodana report focused on real, non-overlapping findings (≈70 instead of ≈1450).
  # (rule IDs verified against the Qodana SARIF)
  - name: PhpDeprecationInspection                    # CS-Cart core deprecations — mostly unavoidable
  - name: PhpUnnecessaryFullyQualifiedNameInspection  # FQN style, not a bug
  - name: PhpMissingParamTypeInspection               # type coverage — PHPStan L10 owns correctness
  - name: PhpMissingReturnTypeInspection
  - name: PhpMissingFieldTypeInspection
  - name: PhpMissingClassConstantTypeInspection
  - name: PhpParamsInspection                          # parameter typing — PHPStan L10 owns this
  - name: PhpMethodParametersCountMismatchInspection  # CS-Cart variadic fn_* false positives
  - name: PhpUnusedParameterInspection                # fixed CS-Cart hook/callback signatures
  - name: PhpRedundantOptionalArgumentInspection
  - name: PhpSameParameterValueInspection
  - name: PhpUnhandledExceptionInspection             # CS-Cart doesn't use checked-exception style
  - name: PhpDocMissingThrowsInspection
  - name: PhpDocSignatureInspection
  - name: PhpRedundantVariableDocTypeInspection
  - name: PhpCastIsUnnecessaryInspection              # conflicts with the TypeCoerce coercion pattern
  - name: PhpUnnecessaryBoolCastInspection
  - name: PhpUnnecessaryStringCastInspection
  - name: PhpConditionAlreadyCheckedInspection        # always-true/false — PHPStan L10 owns this
  - name: PhpArrayIndexImmediatelyRewrittenInspection # false-positive on defensive init-then-populate arrays
  - name: PhpClassCanBeReadonlyInspection
  - name: PhpPluralMixedCanBeReplacedWithArrayInspection
  - name: PhpParameterByRefIsNotUsedAsReferenceInspection
  - name: PhpUnnecessaryLocalVariableInspection
  - name: PhpUnusedFieldDefaultValueInspection
  - name: PhpIfWithCommonPartsInspection
  - name: PhpConditionCheckedByNextConditionInspection
  - name: PhpLoopCanBeConvertedToArrayMapInspection   # refactoring opinions, not defects
  - name: PhpLoopCanBeConvertedToArrayFilterInspection
  - name: PhpSwitchCanBeReplacedWithMatchExpressionInspection
  - name: PhpNullSafeOperatorCanBeUsedInspection
  - name: PhpIssetCanCheckNestedAccessDirectlyInspection
  - name: PhpNotInstalledPackagesInspection           # per-addon composer, not the repo root
  - name: PhpIncludeInspection                        # CS-Cart dynamic includes
  - name: DuplicatedCode                              # refactoring suggestion, not a defect
  # Don't analyse third-party code, build output, or the test scaffolding
  # (its guarded fn_* stubs trip the duplicate-declaration check):
  - name: All
    paths:
      - vendor
      - node_modules
      - var
      - addon-novoton-holidays/app/addons/novoton_holidays/tests
      - addon-travel-core/app/addons/travel_core/tests
      - addon-sphinx-holidays/app/addons/sphinx_holidays/tests
      - addon-fgo-invoicing/app/addons/fgo_invoicing/tests

include:
  - name: CheckDependencyLicenses
