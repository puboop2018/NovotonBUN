<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novoton Booking Form — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    padding: 100px 20px;
    color: #1a1a1a;
  }

  /* ---- Shared form structure ---- */
  .nvt-form-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    background: #fff;
    overflow: visible;
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
  }
  .nvt-field {
    position: relative;
    flex: 1;
    border-right: 1px solid #e0e0e0;
  }
  .nvt-field:last-child { border-right: none; }
  .nvt-field--date { flex: 1.8; }
  .nvt-field--guests { flex: 1.2; }
  .nvt-field--btn { flex: 1; min-width: 160px; border-right: none; }

  .nvt-field-input {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    background: transparent;
    border: none;
    width: 100%;
    text-align: center;
    font: inherit;
    color: inherit;
  }
  .nvt-field-input-icon { flex: 0 0 20px; color: #6b6b6b; display: flex; align-items: center; }
  .nvt-field-input-text { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }
  .nvt-field-input-text .nvt-value {
    display: block; font-size: 14px; font-weight: 500; color: #1a1a1a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nvt-field-input-text .nvt-value--placeholder { color: #1a1a1a; }
  .nvt-field-input-arrow { flex: 0 0 16px; color: #6b6b6b; display: flex; align-items: center; }

  .nvt-btn-search {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; background: #0071E3; color: #fff; border: none;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background 0.15s; width: 100%;
  }
  .nvt-btn-search:hover { background: #005bb5; }

  /* SVG icons */
  svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ---- Form style ----
     - border: 2px solid #FFB703 on parent container
     - Button has rounded corners on ALL sides (6px)
     - 5px internal gap (padding) between button and golden border
     - Button fills 100% height within padding
     - Gray divider between guests and button
     - Button floats inside the golden frame
     ---- */
  .nvt-form-row {
    border: 2px solid #FFB703;
    border-radius: 8px;
  }
  .nvt-field-input {
    padding: 6px 12px;
    min-height: 40px;
  }
  .nvt-field--btn {
    padding: 5px;
    display: flex;
    align-items: stretch;
  }
  .nvt-btn-search {
    font-size: 15px;
    padding: 10px 28px;
    border-radius: 6px;
    height: auto;
  }
</style>
</head>
<body>

  <div class="nvt-form-row">
    <!-- Date field -->
    <div class="nvt-field nvt-field--date">
      <div class="nvt-field-input">
        <span class="nvt-field-input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </span>
        <span class="nvt-field-input-text">
          <span class="nvt-value">Mon. 14 Mar. &#8594; Mon. 21 Mar. (7 nights)</span>
        </span>
        <span class="nvt-field-input-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
    </div>

    <!-- Guests field -->
    <div class="nvt-field nvt-field--guests">
      <div class="nvt-field-input">
        <span class="nvt-field-input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="nvt-field-input-text">
          <span class="nvt-value">2 adults &middot; 0 children &middot; 1 room</span>
        </span>
        <span class="nvt-field-input-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
    </div>

    <!-- Search button -->
    <div class="nvt-field nvt-field--btn">
      <button class="nvt-btn-search">Search</button>
    </div>
  </div>

</body>
</html>
