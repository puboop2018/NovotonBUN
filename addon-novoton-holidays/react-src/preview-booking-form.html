<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novoton Booking Form — Preview (Desktop + Mobile)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    padding: 40px 20px;
    color: #1a1a1a;
  }

  /* ---- Section headings ---- */
  h2 {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .section { margin-bottom: 50px; }

  /* ---- Container: Golden background with 4px gap creating dividers ---- */
  .nvt-form-row {
    display: flex;
    align-items: stretch;
    gap: 4px;
    background: #FFB703;
    border: 3px solid #FFB703;
    border-radius: 10px;
    overflow: visible;
    position: relative;
    margin: 0 auto;
  }

  /* ---- Fields: White "islands" with rounded corners ---- */
  .nvt-field {
    position: relative;
    flex: 1;
    background: #fff;
    border-radius: 6px;
    display: flex;
    align-items: stretch;
  }
  .nvt-field--date { flex: 2; }
  .nvt-field--guests { flex: 1.5; }
  .nvt-field--btn { flex: 0 0 auto; }

  /* ---- Field input: Left-aligned content ---- */
  .nvt-field-input {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    cursor: pointer;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font: inherit;
    color: inherit;
    padding: 6px 12px;
    min-height: 50px;
  }

  .nvt-field-input-icon {
    flex: 0 0 20px;
    color: #6b6b6b;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nvt-field-input-text {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .nvt-field-input-text .nvt-value {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nvt-field-input-text .nvt-value--placeholder {
    color: #1a1a1a;
  }

  .nvt-field-input-arrow {
    flex: 0 0 16px;
    color: #6b6b6b;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- Button: Blue "island" matching border-radius, height 100% ---- */
  .nvt-field--btn {
    padding: 0;
  }

  .nvt-btn-search {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #0071E3;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 28px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    width: 100%;
    height: 100%;
  }

  .nvt-btn-search:hover {
    background: #005bb5;
  }

  /* ---- Mobile simulation: force stacked layout inside .mobile-frame ---- */
  .mobile-frame {
    max-width: 375px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    padding: 20px 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .mobile-frame .nvt-form-row {
    flex-direction: column;
  }
  .mobile-frame .nvt-field {
    border-radius: 0;
  }
  .mobile-frame .nvt-field:first-child {
    border-radius: 8px 8px 0 0;
  }
  .mobile-frame .nvt-field:last-child,
  .mobile-frame .nvt-field--btn {
    border-radius: 0 0 8px 8px;
  }
  .mobile-frame .nvt-btn-search {
    border-radius: 0 0 8px 8px;
    padding: 10px 20px;
  }

  /* ---- Responsive: real mobile ---- */
  @media (max-width: 768px) {
    .nvt-form-row {
      flex-direction: column;
    }
    .nvt-field {
      border-radius: 0;
    }
    .nvt-field:first-child {
      border-radius: 8px 8px 0 0;
    }
    .nvt-field:last-child,
    .nvt-field--btn {
      border-radius: 0 0 8px 8px;
    }
    .nvt-btn-search {
      border-radius: 0 0 8px 8px;
      padding: 10px 20px;
    }
  }

  /* SVG icons */
  svg {
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

  <!-- ========== DESKTOP PREVIEW ========== -->
  <div class="section">
    <h2>Desktop</h2>
    <div class="nvt-form-row" style="max-width: 1100px;">
      <!-- Date field -->
      <div class="nvt-field nvt-field--date">
        <div class="nvt-field-input">
          <span class="nvt-field-input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          <span class="nvt-field-input-text">
            <span class="nvt-value">Mon. 14 Mar. &#8594; Mon. 21 Mar. (7 nights)</span>
          </span>
          <span class="nvt-field-input-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Guests field -->
      <div class="nvt-field nvt-field--guests">
        <div class="nvt-field-input">
          <span class="nvt-field-input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="nvt-field-input-text">
            <span class="nvt-value">2 adults &middot; 0 children &middot; 1 room</span>
          </span>
          <span class="nvt-field-input-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <!-- Search button -->
      <div class="nvt-field nvt-field--btn">
        <button class="nvt-btn-search">Search</button>
      </div>
    </div>
  </div>

  <!-- ========== MOBILE PREVIEW ========== -->
  <div class="section">
    <h2>Mobile (375px)</h2>
    <div class="mobile-frame">
      <div class="nvt-form-row">
        <!-- Date field -->
        <div class="nvt-field nvt-field--date">
          <div class="nvt-field-input">
            <span class="nvt-field-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span class="nvt-field-input-text">
              <span class="nvt-value">Lun. 14 Sept. &#8594; Dum. 20 Sept.</span>
            </span>
            <span class="nvt-field-input-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </div>
        </div>

        <!-- Guests field -->
        <div class="nvt-field nvt-field--guests">
          <div class="nvt-field-input">
            <span class="nvt-field-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
            <span class="nvt-field-input-text">
              <span class="nvt-value">2 adul&#x021B;i &middot; 1 copil &middot; 1 camer&#x103;</span>
            </span>
            <span class="nvt-field-input-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </div>
        </div>

        <!-- Search button -->
        <div class="nvt-field nvt-field--btn">
          <button class="nvt-btn-search">Caut&#x103;</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
