name: Static Analysis & Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── PHPStan (level 10 — zero errors outside baseline) ──
  phpstan:
    name: PHPStan (L10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

  # ── Psalm (second opinion on static analysis) ──
  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run Psalm
        run: vendor/bin/psalm --no-progress --show-info=false

  # ── Code style: PHPCS (PSR-12) ──
  phpcs:
    name: PHPCS (PSR-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPCS
        run: vendor/bin/phpcs --no-cache --report=summary

  # ── PHP CS Fixer (dry-run; fails if formatting would change) ──
  phpcsfixer:
    name: PHP CS Fixer (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  # ── Rector (dry-run; fails if any configured rule would change a file) ──
  rector:
    name: Rector (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run Rector
        run: vendor/bin/rector process --dry-run --no-progress-bar

  # ── PHPMD (mess detection; warnings-only, won't fail CI) ──
  phpmd:
    name: PHPMD
    runs-on: ubuntu-latest
    continue-on-error: true          # PHPMD findings are informational
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install root dev dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPMD
        run: |
          vendor/bin/phpmd \
            addon-novoton-holidays/app/addons/novoton_holidays/src,addon-travel-core/app/addons/travel_core/src,addon-sphinx-holidays/app/addons/sphinx_holidays/src \
            text phpmd.xml

  # ── PHPUnit (novoton suite, with coverage) ──
  phpunit:
    name: PHPUnit (novoton)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addon-novoton-holidays/app/addons/novoton_holidays
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: simplexml, curl, mbstring
          coverage: pcov
          tools: composer:v2

      - name: Install addon dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPUnit (with coverage)
        run: vendor/bin/phpunit --colors=always --coverage-text=coverage.txt --coverage-clover=coverage.xml

      - name: Append coverage summary to job summary
        if: always()
        run: |
          if [ -f coverage.txt ]; then
            {
              echo '## Coverage summary'
              echo ''
              echo '```'
              # Trim ANSI + print from "Code Coverage Report" onward
              awk '/Code Coverage Report/,0' coverage.txt | sed 's/\x1b\[[0-9;]*m//g' | head -80
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            addon-novoton-holidays/app/addons/novoton_holidays/coverage.txt
            addon-novoton-holidays/app/addons/novoton_holidays/coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  # ── PHPUnit integration (novoton) — real MySQL via the pre-baked test-DB image ──
  #
  # Unit tests (above) run with no service container, proving they are DB-free.
  # This job wires up the ghcr.io/puboop2018/novotonbun-test-db image as a
  # service container and runs the Integration testsuite against it. Each
  # test is wrapped in a DB transaction that is rolled back on tearDown.
  #
  # Gating: this job only runs when the repository variable
  # INTEGRATION_TESTDB_READY is set to "true". That variable should be
  # flipped on (Settings → Secrets and variables → Actions → Variables)
  # AFTER the maintainer has:
  #   1. Run docker/test-db/build.sh locally with CSCART_ZIP_PATH +
  #      CSCART_LICENSE_KEY set.
  #   2. Pushed the resulting image to ghcr.io/puboop2018/novotonbun-test-db.
  #   3. Added secrets.GHCR_READ_TOKEN (a PAT with read:packages scope).
  # Until then the job is skipped — its absence does not block merges.
  #
  # See docker/test-db/README.md for how the image is built. The tag here
  # must match what docker-compose.test.yml pins.
  phpunit-integration-novoton:
    name: PHPUnit Integration (novoton)
    runs-on: ubuntu-latest
    if: vars.INTEGRATION_TESTDB_READY == 'true'
    defaults:
      run:
        working-directory: addon-novoton-holidays/app/addons/novoton_holidays
    services:
      db:
        image: ghcr.io/puboop2018/novotonbun-test-db:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READ_TOKEN }}
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: cscart
          MYSQL_USER: cscart
          MYSQL_PASSWORD: cscart
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
          --health-start-period=30s
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: simplexml, curl, mbstring, pdo, pdo_mysql
          tools: composer:v2

      - name: Install addon dependencies
        run: composer install --no-progress --no-interaction

      - name: Wait for MySQL healthcheck
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become healthy"; exit 1

      - name: Run PHPUnit (integration)
        env:
          DB_DSN: 'mysql:host=127.0.0.1;port=3306;dbname=cscart'
          DB_USER: cscart
          DB_PASS: cscart
        run: vendor/bin/phpunit -c phpunit-integration.xml --colors=always --no-coverage

  # ── PHPUnit (travel_core suite) ──
  phpunit-travel-core:
    name: PHPUnit (travel_core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addon-travel-core/app/addons/travel_core
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: simplexml, curl, mbstring
          tools: composer:v2

      - name: Install addon dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always --no-coverage

  # ── PHPUnit (sphinx_holidays suite) ──
  phpunit-sphinx:
    name: PHPUnit (sphinx_holidays)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addon-sphinx-holidays/app/addons/sphinx_holidays
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: simplexml, curl, mbstring
          tools: composer:v2

      - name: Install addon dependencies
        run: composer install --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always --no-coverage

  # ── php -l syntax check on all PHP files ──
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint all PHP files
        run: |
          find addon-novoton-holidays/app/addons/novoton_holidays/src \
               addon-travel-core/app/addons/travel_core/src \
               addon-sphinx-holidays/app/addons/sphinx_holidays/src \
               -name '*.php' -print0 | xargs -0 -n 50 php -l
